title: "🛡️ NYSE Fortress"
description: "Daily Market Strategy Briefing — Real Data, Every Morning at 9:35 AM ET"
url: "https://chetan864.github.io"
baseurl: "/nyse-fortress"
timezone: "America/New_York"

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /briefing/:year/:month/:day/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude from build
exclude:
  - generate_briefing.py
  - requirements.txt
  - README.md
  - "*.sh"

# Theme variables
accent_color: "#00D4FF"
bg_color: "#050A0F"
